<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Account | ElectroHub</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="container header-inner">
    <a href="index.html" class="site-logo">Electro<span>Hub</span></a>
    <nav class="site-nav">
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
    </nav>
    <div class="header-actions">
      <a href="cart.html" class="icon-btn" title="Cart"><i class="fas fa-shopping-cart"></i><span class="cart-count-badge" id="nav-cart-count">0</span></a>
      <a href="#" class="icon-btn filled" id="nav-account" title="Account"><i class="fas fa-user"></i></a>
    </div>
  </div>

      <!-- Hamburger button: only visible on mobile -->
      <button class="burger-btn" id="burger-btn" aria-label="Open menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</header>

<!-- ── MOBILE DRAWER ──────────────────────────────── -->
<div class="mobile-drawer" id="mobile-drawer">
  <div class="mobile-drawer-inner">
    <div class="mobile-drawer-header">
      <a href="index.html" class="site-logo">Electro<span>Hub</span></a>
      <button class="drawer-close-btn" id="drawer-close-btn" aria-label="Close menu">&times;</button>
    </div>
    <div class="mobile-search">
      <input type="text" id="mobile-search-input" placeholder="Search products...">
      <button onclick="window.location.href='shop.html?search='+document.getElementById('mobile-search-input').value">
        <i class="fas fa-search"></i>
      </button>
    </div>
    <nav class="mobile-nav">
      <a href="index.html"><i class="fas fa-home"></i> Home</a>
      <a href="shop.html"><i class="fas fa-store"></i> Shop</a>
      <a href="index.html#categories"><i class="fas fa-th-large"></i> Categories</a>
      <a href="index.html#reviews"><i class="fas fa-star"></i> Reviews</a>
      <a href="contact.html"><i class="fas fa-envelope"></i> Contact</a>
    </nav>
    <div class="mobile-drawer-footer">
      <a href="login.html" class="mobile-auth-btn"><i class="fas fa-user"></i> Login / Sign Up</a>
      <a href="cart.html" class="mobile-auth-btn mobile-cart-btn"><i class="fas fa-shopping-bag"></i> Cart</a>
    </div>
  </div>
</div>
<div class="mobile-drawer-overlay" id="mobile-drawer-overlay"></div>

<div class="bg-soft py-4">
  <div class="container">
    <nav aria-label="breadcrumb" style="font-size:.85rem;">
      <ol class="breadcrumb mb-0">
        <li class="breadcrumb-item"><a href="index.html" class="text-muted">Home</a></li>
        <li class="breadcrumb-item active text-muted">My Account</li>
      </ol>
    </nav>
  </div>
</div>

<section class="section-gap">
  <div class="container">
    <div class="row g-5">

      <!-- Sidebar Profile -->
      <div class="col-lg-3">
        <div style="background:var(--bg-soft); border-radius:var(--radius-xl); padding:32px; text-align:center;">
          <div class="reviewer-avatar mx-auto mb-3" style="width:64px;height:64px;font-size:1.4rem;" id="profile-avatar">?</div>
          <h5 class="fw-700 mb-1" id="profile-name" style="font-weight:700;">Loading…</h5>
          <p class="text-muted mb-4" style="font-size:.85rem;" id="profile-email">—</p>
          <div class="d-flex flex-column gap-2">
            <button class="profile-tab-btn active" data-tab="orders" onclick="switchProfileTab('orders')" style="background:var(--charcoal);color:#fff;border:none;padding:10px 20px;border-radius:var(--radius-pill);font-size:.9rem;font-weight:500;cursor:pointer;text-align:left;">
              <i class="fas fa-box me-2"></i> My Orders
            </button>
            <button class="profile-tab-btn" data-tab="settings" onclick="switchProfileTab('settings')" style="background:transparent;color:var(--muted);border:none;padding:10px 20px;border-radius:var(--radius-pill);font-size:.9rem;font-weight:500;cursor:pointer;text-align:left;">
              <i class="fas fa-cog me-2"></i> Account Settings
            </button>
            <button onclick="logoutUser()" style="background:transparent;color:#ef4444;border:none;padding:10px 20px;border-radius:var(--radius-pill);font-size:.9rem;font-weight:500;cursor:pointer;text-align:left;margin-top:8px;">
              <i class="fas fa-sign-out-alt me-2"></i> Sign Out
            </button>
          </div>
        </div>

        <!-- Stats -->
        <div class="row g-3 mt-3">
          <div class="col-6">
            <div class="profile-stat">
              <div style="font-size:1.6rem;font-weight:800;color:var(--coral);" id="stat-orders">0</div>
              <div style="font-size:.75rem;color:var(--muted);">Orders</div>
            </div>
          </div>
          <div class="col-6">
            <div class="profile-stat">
              <div style="font-size:1.6rem;font-weight:800;color:var(--charcoal);" id="stat-spent">$0</div>
              <div style="font-size:.75rem;color:var(--muted);">Spent</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Main Content -->
      <div class="col-lg-9">

        <!-- Orders Tab -->
        <div id="tab-orders">
          <h2 class="section-title mb-5" style="font-size:1.7rem;">Order History</h2>
          <div id="orders-list">
            <div class="text-center py-5"><div class="spinner-border" style="color:var(--coral);"></div></div>
          </div>
        </div>

        <!-- Settings Tab -->
        <div id="tab-settings" style="display:none;">
          <h2 class="section-title mb-5" style="font-size:1.7rem;">Account Settings</h2>
          <div style="max-width:480px;">
            <div class="mb-4">
              <label class="form-label" style="font-size:.85rem;font-weight:600;">Full Name</label>
              <input type="text" id="settings-name" class="form-control" style="border-radius:var(--radius-sm);padding:12px 16px;border-color:var(--border);">
            </div>
            <div class="mb-4">
              <label class="form-label" style="font-size:.85rem;font-weight:600;">Email</label>
              <input type="email" id="settings-email" class="form-control" style="border-radius:var(--radius-sm);padding:12px 16px;border-color:var(--border);" readonly>
              <div style="font-size:.75rem;color:var(--muted);margin-top:4px;">Email cannot be changed.</div>
            </div>
            <div class="mb-4">
              <label class="form-label" style="font-size:.85rem;font-weight:600;">Phone</label>
              <input type="tel" id="settings-phone" class="form-control" placeholder="+961 79 30 79 04" style="border-radius:var(--radius-sm);padding:12px 16px;border-color:var(--border);">
            </div>
            <button class="btn-coral" style="padding:12px 28px;border-radius:var(--radius-sm);">Save Changes</button>
          </div>
        </div>

      </div>
    </div>
  </div>
</section>

<div class="toast-wrap" id="toast-wrap"></div>

<footer class="site-footer mt-5">
  <div class="container">
    <div class="footer-bottom">
      <span>© 2025 ElectroHub · Ali Ghandour. All rights reserved.</span>
    </div>
  </div>
</footer>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script>
$(document).ready(function () {

  // Auth guard
  $.get('/api/auth/me').done(function (res) {
    if (!res.isAuthenticated) {
      window.location.href = '/login.html';
      return;
    }
    const user = res.user;
    // Set initials avatar
    const initials = user.name.split(' ').map(n => n[0]).join('').toUpperCase().slice(0, 2);
    $('#profile-avatar').text(initials);
    $('#profile-name').text(user.name);
    $('#profile-email').text('Member since your first order');
    $('#settings-name').val(user.name);
    $('#settings-email').val(user.email || '');
    $('#nav-account').html('<i class="fas fa-user"></i>');

    if (user.role === 'admin') {
      $('<a href="/admin.html" class="icon-btn" title="Admin"><i class="fas fa-tachometer-alt"></i></a>').insertBefore('#nav-account');
    }

    loadOrders();
    updateCartBadge();
  });

  function loadOrders() {
    $.get('/api/auth/orders').done(function (orders) {
      if (!orders.length) {
        $('#orders-list').html(`
          <div class="text-center py-5">
            <i class="fas fa-shopping-bag fa-3x mb-3" style="color:var(--border);"></i>
            <h5 class="fw-600" style="font-weight:600;">No orders yet</h5>
            <p class="text-muted mb-4">Start shopping and your orders will appear here.</p>
            <a href="shop.html" class="btn-coral" style="padding:12px 24px;border-radius:var(--radius-sm);">Browse Products</a>
          </div>`);
        return;
      }
      let totalSpent = 0;
      let html = '';
      orders.forEach(o => {
        totalSpent += parseFloat(o.total_amount);
        const date = new Date(o.created_at).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
        const statusColor = { pending:'#f59e0b', shipped:'#3b82f6', delivered:'#16a34a' }[o.status] || '#888';
        html += `
        <div class="cart-item-card" style="cursor:default;">
          <div class="d-flex justify-content-between align-items-start flex-wrap gap-3">
            <div>
              <div style="font-size:.75rem;color:var(--muted);margin-bottom:4px;">${date}</div>
              <div style="font-weight:700;font-size:1.05rem;">Order #${o.id}</div>
              <div style="font-size:.85rem;color:var(--muted);margin-top:4px;">
                <i class="fas fa-map-marker-alt me-1"></i> ${o.shipping_address || 'No address provided'}
              </div>
            </div>
            <div class="text-end">
              <div style="font-weight:800;font-size:1.2rem;color:var(--coral);">$${parseFloat(o.total_amount).toFixed(2)}</div>
              <div class="mt-1">
                <span style="display:inline-block;padding:3px 12px;border-radius:var(--radius-pill);font-size:.75rem;font-weight:700;background:${statusColor}20;color:${statusColor};">
                  ${o.status.toUpperCase()}
                </span>
              </div>
            </div>
          </div>
        </div>`;
      });
      $('#orders-list').html(html);
      $('#stat-orders').text(orders.length);
      $('#stat-spent').text('$' + totalSpent.toFixed(0));
    }).fail(function () {
      $('#orders-list').html('<div class="alert alert-info">Could not load order history.</div>');
    });
  }

  window.switchProfileTab = function (tab) {
    if (tab === 'orders') { $('#tab-orders').show(); $('#tab-settings').hide(); }
    else { $('#tab-orders').hide(); $('#tab-settings').show(); }
    $('.profile-tab-btn').css({ background:'transparent', color:'var(--muted)' });
    $('[data-tab="' + tab + '"]').css({ background:'var(--charcoal)', color:'#fff' });
  };

  window.logoutUser = function () {
    $.post('/api/auth/logout', function () { window.location.href = '/index.html'; });
  };
});
</script>
</body>
</html>
